<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสอบออนไลน์ - ลงทะเบียนเข้าสอบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #e2e8f0; 
        }
    </style>
</head>
<body class="min-h-screen flex justify-center items-center p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 border border-gray-100">
        
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-clipboard-user text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-[#1e293b] mb-2">ลงทะเบียนเข้าสอบ</h1>
            <p class="text-gray-500 text-sm">กรุณากรอกข้อมูลให้ครบถ้วนเพื่อผลบนเกียรติบัตร</p>
        </div>

        <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl mb-6">
            <h2 class="text-sm font-bold text-blue-800 mb-1">ทดสอบหลังการอบรม (Post-test)</h2>
            <div class="flex items-center text-xs text-blue-600 gap-4 mt-2">
                <span><i class="fa-regular fa-clock mr-1"></i> 60 นาที</span>
                <span><i class="fa-solid fa-list-check mr-1"></i> เกณฑ์ผ่าน 80%</span>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ-นามสกุล (ไม่ต้องระบุคำนำหน้า)</label>
                <input type="text" id="studentName" placeholder="เช่น สมชาย ใจดี" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            </div>

            <button onclick="startExam()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl px-4 py-3.5 shadow-md hover:shadow-lg transition-all flex justify-center items-center text-lg mt-2">
                เข้าสู่ห้องสอบ <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i>
            </button>
            
            <a href="index.html" class="block text-center text-sm text-gray-400 hover:text-gray-600 mt-4 transition-colors">
                ยกเลิก
            </a>
        </div>
    </div>

    <script>
        function startExam() {
            const nameInput = document.getElementById('studentName').value;
            
            // เช็คว่าปล่อยช่องว่างไว้หรือไม่
            if (nameInput.trim() === '') {
                alert('กรุณากรอกชื่อ-นามสกุลก่อนเข้าสอบครับ!');
                return; // หยุดการทำงาน ไม่ให้เปลี่ยนหน้า
            }

            // ถ้ากรอกแล้ว ให้จำชื่อไว้ในระบบ แล้วเปลี่ยนหน้า
            localStorage.setItem('studentFullName', nameInput);
            window.location.href = 'exam-room.html';
        }
    </script>
</body>
</html>
