<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสอบออนไลน์ - หน้าหลัก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            
            /* =========================================
               แก้ชื่อไฟล์เป็น .png ให้ตรงกับรูปที่คุณครูมี
               ========================================= */
            background-image: url('image.png'); 
            
            background-size: cover;             
            background-position: top center;    
            background-attachment: fixed;       
            background-repeat: no-repeat;       
            background-color: #1e293b;          
        }

        /* แผ่นฟิล์มกรองแสง (มืดๆ) ทับพื้นหลัง */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.5);
            z-index: 0;
            /* เพิ่มคำสั่งนี้ เพื่อให้คลิกทะลุแผ่นฟิล์มไปกดปุ่มได้ครับ */
            pointer-events: none; 
        }

        /* ยกกล่องเนื้อหาให้อยู่เหนือแผ่นฟิล์ม */
        .content-wrapper {
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-overlay"></div>

    <div class="content-wrapper w-full max-w-md bg-white/95 backdrop-blur-sm rounded-3xl shadow-2xl p-8 relative overflow-hidden">
        
        <div class="relative z-10 text-center mt-2">
            <div class="w-20 h-20 bg-white rounded-2xl shadow-md flex items-center justify-center mx-auto mb-4 border-2 border-blue-50">
                <i class="fa-solid fa-graduation-cap text-4xl text-blue-600"></i>
            </div>
            
            <h1 class="text-2xl font-bold text-slate-800 mb-1">ระบบทดสอบออนไลน์</h1>
            <p class="text-gray-500 text-sm mb-8">โรงเรียนส่งเสริมความปลอดภัย (SPS)</p>

            <div class="text-left bg-gray-50/80 p-5 rounded-2xl border border-gray-100 shadow-sm">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fa-regular fa-id-card mr-1"></i> กรุณากรอกชื่อ-นามสกุล
                </label>
                <input type="text" id="studentName" placeholder="เช่น ด.ช.สมชาย ใจดี" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white mb-4 transition-all">
                
                <button onclick="startExam()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl px-4 py-3.5 shadow-lg transition-transform transform hover:-translate-y-1 flex justify-center items-center">
                    เริ่มทำแบบทดสอบ <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i>
                </button>
            </div>
        </div>

        <div class="mt-6 grid grid-cols-2 gap-4">
            <a href="dashboard.html" class="flex flex-col items-center justify-center p-3 bg-white border border-gray-200 rounded-2xl hover:bg-blue-50 hover:border-blue-200 transition-all shadow-sm">
                <i class="fa-solid fa-chart-line text-blue-600 text-lg mb-1"></i>
                <span class="text-xs font-semibold text-gray-600">รายงานผล</span>
            </a>
            
            <a href="mailto:your-email@example.com" class="flex flex-col items-center justify-center p-3 bg-white border border-gray-200 rounded-2xl hover:bg-orange-50 hover:border-orange-200 transition-all shadow-sm">
                <i class="fa-solid fa-envelope text-orange-500 text-lg mb-1"></i>
                <span class="text-xs font-semibold text-gray-600">ติดต่อครู</span>
            </a>
        </div>
    </div>

    <script>
        function startExam() {
            const nameInput = document.getElementById('studentName').value.trim();
            if (nameInput === "") {
                alert("กรุณากรอกชื่อ-นามสกุลก่อนเข้าสอบครับ");
                return;
            }
            localStorage.setItem('studentFullName', nameInput);
            window.location.href = 'exam-room.html';
        }
    </script>
</body>
</html>
