                    A: "บอกให้อดทนไว้",

                    C: "รับฟังอย่างเข้าใจ และดำเนินการตามระบบดูแลช่วยเหลือ", 
                    D: "ตำหนินักเรียนว่าอ่อนแอเกินไป" 
                }, 
                answer: "C" 
            },
            { 
                id: 19, 
                question: "ข้อใดคือความเข้าใจที่ถูกต้องที่สุดเรื่อง “ความปลอดภัยในโรงเรียน” ?", 
                options: { 
                    A: "เป็นแค่เรื่องอุบัติเหตุ", 
                    B: "ครอบคลุมทั้งร่างกาย จิตใจ และสภาพแวดล้อม", 
                    C: "เกี่ยวข้องเฉพาะช่างเท่านั้น", 
                    D: "เป็นเรื่องที่แก้ไขยากไม่ควรใส่ใจมากนัก" 
                }, 
                answer: "B" 
            },
            { 
                id: 20, 
                question: "ความปลอดภัยของนักเรียน เป็นหน้าที่ของใคร ?", 
                options: { 
                    A: "เป็นเรื่องของผู้บริหารและเจ้าหน้าที่เท่านั้น", 
                    B: "เป็นภาระเพิ่มที่ไม่เกี่ยวกับการสอน", 
                    C: "เป็นหน้าที่ร่วมกันของทุกคนในการดูแลนักเรียน", 
                    D: "เป็นเรื่องที่ผู้ปกครองควรรับผิดชอบมากกว่าโรงเรียน" 
                }, 
                answer: "C" 
            }
                    // *** คุณสามารถคัดลอกโครงสร้างด้านบน เพื่อเพิ่มข้อ 4, 5, 6 จนถึงข้อ 20 ต่อลงมาได้เลยครับ ***
        ];

        // ==========================================
        // โค้ดการทำงานหลัก (ไม่ต้องแก้ส่วนนี้)
        // ==========================================

        document.querySelector('h1').innerText = examTitle;

        let userAnswers = {};
        let currentIndex = 0;
        let shuffledQuestions = [];

        // ฟังก์ชันสุ่มข้อสอบ
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        shuffledQuestions = shuffle([...questionPool]);

        // ระบบนับเวลาถอยหลัง
        let timeLeft = examMinutes * 60; 
        const timerDisplay = document.querySelector('.fa-clock').parentElement;

        const countdown = setInterval(() => {
            timeLeft--;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.innerHTML = `<i class="fa-regular fa-clock mr-2 animate-pulse"></i> ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                alert("หมดเวลาแล้ว!");
                submitExam(); 
            }
        }, 1000);

        // ฟังก์ชันแสดงข้อสอบทีละข้อ
        function renderQuestion(index) {
            const q = shuffledQuestions[index];
            const container = document.getElementById('quiz-container');
            
            document.querySelector('.bg-blue-100').innerText = `ข้อที่ ${index + 1} / ${shuffledQuestions.length}`;
            const progressPercent = ((index + 1) / shuffledQuestions.length) * 100;
            document.querySelector('.bg-green-500').style.width = progressPercent + '%';

            const previousAnswer = userAnswers[`q${q.id}`] || '';

            container.innerHTML = `
                <h2 class="text-lg font-semibold mb-6 text-slate-800">${q.question}</h2>
                ${Object.entries(q.options).map(([key, val]) => `
                    <label class="block relative cursor-pointer mb-3">
                        <input type="radio" name="q${q.id}" value="${key}" class="peer sr-only" onchange="saveAnswer('q${q.id}', '${key}')" ${previousAnswer === key ? 'checked' : ''}>
                        <div class="p-4 rounded-xl border-2 border-gray-100 bg-gray-50 text-gray-700 font-medium transition-all hover:bg-gray-100 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 flex items-start">
                            <span class="w-8 shrink-0 font-bold">${key === 'A' ? 'ก.' : key === 'B' ? 'ข.' : key === 'C' ? 'ค.' : 'ง.'}</span>
                            <span>${val}</span>
                        </div>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-blue-500 opacity-0 peer-checked:opacity-100 transition-opacity">
                            <i class="fa-solid fa-circle-check text-xl"></i>
                        </div>
                    </label>
                `).join('')}
            `;

            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            if (index === 0) {
                prevBtn.style.visibility = 'hidden';
            } else {
                prevBtn.style.visibility = 'visible';
            }

            if (index === shuffledQuestions.length - 1) {
                nextBtn.className = "flex-1 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl px-4 py-3.5 shadow-md transition-all flex justify-center items-center text-center";
                nextBtn.innerHTML = `ส่งข้อสอบ <i class="fa-solid fa-paper-plane ml-2"></i>`;
                nextBtn.setAttribute('onclick', 'submitExam()');
            } else {
                nextBtn.className = "flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl px-4 py-3.5 shadow-md transition-all flex justify-center items-center";
                nextBtn.innerHTML = `ข้อต่อไป <i class="fa-solid fa-chevron-right ml-2"></i>`;
                nextBtn.setAttribute('onclick', 'changeQuestion(1)');
            }
        }

        function changeQuestion(direction) {
            currentIndex += direction;
            if (currentIndex >= 0 && currentIndex < shuffledQuestions.length) {
                renderQuestion(currentIndex);
            }
        }

        function saveAnswer(qId, value) {
            userAnswers[qId] = value;
        }

        function submitExam() {
            clearInterval(countdown); 
            
            let score = 0;
            // ระบบตรวจคำตอบแบบรัดกุม (ตัดช่องว่างและแปลงเป็นพิมพ์ใหญ่ทั้งหมด)
            shuffledQuestions.forEach(q => {
                const userAnswer = (userAnswers[`q${q.id}`] || '').toString().trim().toUpperCase();
                const correctAnswer = (q.answer || '').toString().trim().toUpperCase();
                
                if (userAnswer !== '' && userAnswer === correctAnswer) {
                    score++;
                }
            });
            
            // บันทึกคะแนนลงเครื่อง
     localStorage.setItem(
    "currentUser",
    JSON.stringify(currentUser)
);
            // ไปหน้าประกาศผล
            window.location.href = 'exam-result.html'; 
        }
        // เริ่มแสดงข้อแรก
        renderQuestion(0);
    </script>
</body>
</html>
